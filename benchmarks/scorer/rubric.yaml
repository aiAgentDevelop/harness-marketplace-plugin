# LLM Judge Rubric — 7 dimensions (1-10 each)
# Used by llm-judge.js to score run outputs.

dimensions:
  code_quality:
    label: "Code Quality"
    description: "Readability, organization, idiomatic framework usage."

  completeness:
    label: "Requirements Completeness"
    description: >
      How thoroughly requirements from the task spec are met. Missing work → low.
      Extra unauthorized work also reduces this (scope boundaries matter).

  edge_cases:
    label: "Edge Case Handling"
    description: "Error paths, empty states, boundary conditions, invalid inputs."

  security:
    label: "Security"
    description: >
      No hardcoded secrets, validated inputs, correct auth, parameterized queries.
      Obvious vulnerabilities (XSS, SQL injection, path traversal) must be penalized.

  plan_adherence:
    label: "Plan Adherence"
    description: >
      Does the final diff match what a reasonable plan would produce?
      Is the implementation focused on the stated task (not sprawling)?

  scope_creep:
    label: "Scope Containment (reverse-scored)"
    description: >
      Penalizes files/code added outside the task's implied scope.
      HIGH score (10) = no creep; LOW score (1) = massive unrelated changes.
      Specifically calibrated so harness's verbose-output failure mode is measured.

  over_engineering:
    label: "Right-sized Implementation (reverse-scored)"
    description: >
      Penalizes unnecessary abstractions, premature generalization, overzealous
      error handling not asked for, gratuitous new dependencies or utilities.
      HIGH score (10) = minimal, right-sized; LOW score (1) = heavily over-built.

output_schema:
  type: json
  keys:
    - code_quality: "integer 1-10"
    - code_quality_reason: "one sentence"
    - completeness: "integer 1-10"
    - completeness_reason: "one sentence"
    - edge_cases: "integer 1-10"
    - edge_cases_reason: "one sentence"
    - security: "integer 1-10"
    - security_reason: "one sentence"
    - plan_adherence: "integer 1-10"
    - plan_adherence_reason: "one sentence"
    - scope_creep: "integer 1-10 (reverse-scored)"
    - scope_creep_reason: "one sentence"
    - over_engineering: "integer 1-10 (reverse-scored)"
    - over_engineering_reason: "one sentence"
    - overall_notes: "max 3 sentences"

interpretation:
  # For aggregate reporting, these are the dimensions where HIGHER = better
  positive_dims: [code_quality, completeness, edge_cases, security, plan_adherence]
  # These are reverse-scored: HIGHER score means LESS of the bad thing
  reverse_dims: [scope_creep, over_engineering]
