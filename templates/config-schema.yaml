# project-config.yaml JSON Schema
# Validates the configuration file used by project-harness to drive pipeline behavior.
# Generated by harness-marketplace during project initialization.

$schema: "http://json-schema.org/draft-07/schema#"
title: ProjectHarnessConfig
description: Configuration schema for project-harness pipeline. Controls worker composition, conditional flags, and command overrides.

type: object
required:
  - version
  - generated_by
  - language
  - project_type
  - platform
  - flags
  - commands

additionalProperties: false

properties:

  # ─── Meta ────────────────────────────────────────────────────────────────

  version:
    type: string
    description: Schema version for forward compatibility.
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    example: "1.0.0"

  generated_by:
    type: string
    description: Plugin or tool that generated this config.
    example: "harness-marketplace@1.0.0"

  language:
    type: string
    description: Primary programming language of the project.
    enum:
      - typescript
      - javascript
      - python
      - java
      - go
      - rust
      - csharp
      - other
    example: "typescript"

  # ─── Project Type ─────────────────────────────────────────────────────────

  project_type:
    type: object
    description: Categorizes the project to inform pipeline behavior.
    required:
      - category
    additionalProperties: false
    properties:
      category:
        type: string
        description: High-level project category.
        enum:
          - web-app
          - mobile-app
          - desktop-app
          - api-service
          - library
          - cli-tool
          - monorepo
          - game
          - other
        example: "web-app"
      subcategory:
        type: string
        description: More specific classification within the category.
        example: "saas-dashboard"
      purpose:
        type: string
        description: Brief human-readable description of what the project does.
        maxLength: 200
        example: "B2B SaaS project management dashboard"

  # ─── Platform ─────────────────────────────────────────────────────────────

  platform:
    type: object
    description: Technology platform details. Controls which workers are activated.
    additionalProperties: false
    properties:

      backend:
        type: object
        description: Backend server configuration.
        additionalProperties: false
        properties:
          framework:
            type: string
            description: Backend framework used.
            enum:
              - nestjs
              - express
              - fastify
              - koa
              - hapi
              - spring
              - django
              - fastapi
              - rails
              - laravel
              - gin
              - echo
              - none
              - other
            example: "nestjs"
          port:
            type: integer
            description: Default server port.
            minimum: 1
            maximum: 65535
            example: 3000

      frontend:
        type: object
        description: Frontend framework/renderer configuration.
        additionalProperties: false
        properties:
          framework:
            type: string
            description: Frontend framework.
            enum:
              - react
              - vue
              - angular
              - svelte
              - solid
              - nextjs
              - nuxt
              - remix
              - none
              - other
            example: "react"
          meta_framework:
            type: string
            description: Meta-framework wrapping the frontend framework.
            enum:
              - nextjs
              - nuxt
              - remix
              - sveltekit
              - astro
              - none
            example: "nextjs"

      database:
        type: object
        description: Primary database configuration.
        additionalProperties: false
        properties:
          primary:
            type: string
            description: Primary database engine.
            enum:
              - postgresql
              - mysql
              - sqlite
              - mongodb
              - dynamodb
              - firestore
              - supabase
              - planetscale
              - none
              - other
            example: "postgresql"
          orm:
            type: string
            description: ORM or query builder used.
            enum:
              - prisma
              - typeorm
              - sequelize
              - drizzle
              - mongoose
              - sqlalchemy
              - hibernate
              - none
              - other
            example: "prisma"

      cache:
        type: object
        description: Caching layer configuration.
        additionalProperties: false
        properties:
          engine:
            type: string
            enum:
              - redis
              - memcached
              - upstash
              - none
              - other
            example: "redis"

      deployment:
        type: object
        description: Deployment target configuration.
        additionalProperties: false
        properties:
          target:
            type: string
            enum:
              - vercel
              - netlify
              - aws
              - gcp
              - azure
              - railway
              - render
              - fly
              - docker
              - kubernetes
              - none
              - other
            example: "vercel"
          serverless:
            type: boolean
            description: Whether the deployment uses serverless functions.
            default: false
            example: false

      communication:
        type: object
        description: Client-server communication methods.
        additionalProperties: false
        properties:
          primary:
            type: string
            description: Primary API communication style.
            enum:
              - rest
              - graphql
              - grpc
              - trpc
              - none
            example: "rest"
          realtime:
            type: string
            description: Realtime communication method (if any).
            enum:
              - websocket
              - sse
              - long-polling
              - none
            example: "websocket"

  # ─── Tech Stack ───────────────────────────────────────────────────────────

  tech_stack:
    type: object
    description: Detailed technology stack choices that affect worker behavior.
    additionalProperties: false
    properties:

      monorepo:
        type: object
        additionalProperties: false
        properties:
          tool:
            type: string
            enum:
              - turborepo
              - nx
              - pnpm-workspaces
              - lerna
              - none
            example: "turborepo"

      architecture:
        type: string
        description: Code organization architecture pattern.
        enum:
          - fsd
          - feature-sliced
          - clean
          - hexagonal
          - mvc
          - layered
          - modular
          - flat
          - other
        example: "fsd"

      ui_library:
        type: string
        description: Component library used for UI.
        enum:
          - shadcn
          - mui
          - antd
          - chakra
          - mantine
          - radix
          - headlessui
          - tailwind-only
          - none
          - other
        example: "shadcn"

      state_management:
        type: string
        description: Client-side state management solution.
        enum:
          - zustand
          - redux
          - jotai
          - recoil
          - mobx
          - pinia
          - signals
          - none
          - other
        example: "zustand"

      css:
        type: string
        description: CSS solution.
        enum:
          - tailwind
          - css-modules
          - styled-components
          - emotion
          - sass
          - vanilla-css
          - other
        example: "tailwind"

      auth:
        type: string
        description: Authentication solution.
        enum:
          - nextauth
          - clerk
          - auth0
          - supabase-auth
          - firebase-auth
          - custom-jwt
          - none
          - other
        example: "nextauth"

  # ─── Additional Integrations ──────────────────────────────────────────────

  additional:
    type: object
    description: Optional integrations and service dependencies.
    additionalProperties: false
    properties:

      message_queue:
        type: string
        description: Message queue or event streaming platform.
        enum:
          - rabbitmq
          - kafka
          - sqs
          - bull
          - none
          - other
        example: "none"

      push_notification:
        type: string
        description: Push notification provider.
        enum:
          - firebase-fcm
          - apns
          - onesignal
          - none
          - other
        example: "none"

      ci_cd:
        type: string
        description: CI/CD platform.
        enum:
          - github-actions
          - gitlab-ci
          - circleci
          - jenkins
          - none
          - other
        example: "github-actions"

      test_strategy:
        type: object
        description: Testing approach configuration.
        additionalProperties: false
        properties:
          unit:
            type: string
            enum: [jest, vitest, mocha, pytest, junit, none]
            example: "vitest"
          e2e:
            type: string
            enum: [playwright, cypress, none]
            example: "playwright"
          coverage_threshold:
            type: integer
            minimum: 0
            maximum: 100
            description: Minimum test coverage percentage required.
            example: 80

  # ─── Flags ────────────────────────────────────────────────────────────────

  flags:
    type: object
    description: >
      Derived boolean flags that control worker activation across all pipeline phases.
      These are either set directly or auto-derived from platform/tech_stack values.
    required:
      - has_ui
      - has_backend
      - has_database
    additionalProperties: false
    properties:

      has_ui:
        type: boolean
        description: >
          Project has a browser-rendered UI. When true: ux-checker, ux-reviewer, design-reviewer
          workers are activated, and visual_qa is included in the pipeline.
        example: true

      has_backend:
        type: boolean
        description: >
          Project has a server-side backend. When true: security-checker, backend-auditor
          workers are activated.
        example: true

      has_database:
        type: boolean
        description: >
          Project uses a persistent database. When true: schema-explorer, db-checker,
          db-auditor workers are activated.
        example: true

      has_cache:
        type: boolean
        description: Project uses a caching layer (Redis, Memcached, etc.).
        default: false
        example: false

      has_auth:
        type: boolean
        description: >
          Project has authentication/authorization. When true: auth-checker, auth-auditor
          workers are activated.
        default: false
        example: true

      has_realtime:
        type: boolean
        description: >
          Project uses real-time communication (WebSocket, SSE). When true: realtime-checker,
          realtime-auditor workers are activated.
        default: false
        example: false

      visual_qa_capable:
        type: boolean
        description: >
          Auto-derived: true when has_ui=true AND frontend.framework is browser-renderable.
          Controls whether project-visual-qa phase is included in the pipeline.
        example: true

  # ─── Agents ───────────────────────────────────────────────────────────────

  agents:
    type: array
    description: >
      List of agent names selected for this project. Each agent corresponds to a
      domain-specific worker that is spawned in explore, implement, and verify phases.
      Agents are defined in the harness-marketplace agent catalog.
    items:
      type: string
      description: Agent name as registered in the marketplace catalog.
    uniqueItems: true
    example:
      - "security-auditor"
      - "accessibility-checker"
      - "performance-analyzer"

  # ─── Guides ───────────────────────────────────────────────────────────────

  guides:
    type: array
    description: >
      List of guide names selected for this project. Each guide is a markdown file
      loaded into worker prompts at the appropriate pipeline phase. Guides are
      defined in the harness-marketplace guide catalog.
    items:
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          description: Guide name as registered in the marketplace catalog.
          example: "architecture-guide"
        condition:
          type: string
          description: >
            Optional flag condition under which this guide is loaded.
            When omitted, the guide is always loaded.
            Supports: "has_ui", "has_backend", "has_database", "has_auth",
            "has_realtime", or any custom flag name.
          example: "has_ui"
        path:
          type: string
          description: >
            Resolved path to the guide markdown file.
            Relative to the project's .claude/ directory.
          example: "guides/ui-guidelines.md"
    example:
      - name: "global-rules"
        path: "guides/global-rules.md"
      - name: "ui-guidelines"
        condition: "has_ui"
        path: "guides/ui-guidelines.md"
      - name: "security-guide"
        condition: "has_backend"
        path: "guides/security.md"

  # ─── Required MCPs ────────────────────────────────────────────────────────

  required_mcps:
    type: array
    description: >
      MCP servers required for this project's pipeline.
      Listed with install commands so the generator can warn or auto-install.
    items:
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          description: MCP server name.
          example: "chrome-devtools-mcp"
        condition:
          type: string
          description: >
            Flag condition that makes this MCP required.
            When omitted, the MCP is always required.
          example: "has_ui"
        install_command:
          type: string
          description: Command to install or configure this MCP server.
          example: "npx @chrome-devtools/mcp install"
        optional:
          type: boolean
          description: >
            When true, pipeline falls back gracefully if MCP is unavailable.
            When false, pipeline warns and may skip dependent phases.
          default: true
          example: true
    example:
      - name: "chrome-devtools-mcp"
        condition: "has_ui"
        install_command: "npx @chrome-devtools/mcp install"
        optional: true

  # ─── Commands ─────────────────────────────────────────────────────────────

  commands:
    type: object
    description: >
      Project-specific commands used throughout the pipeline. Override defaults
      inferred from the framework. All commands are run from the project root.
    required:
      - build
    additionalProperties: false
    properties:

      dev:
        type: string
        description: Start the development server (used by visual-qa and monitor).
        example: "npm run dev"

      build:
        type: string
        description: Production build command (used by build gates in all phases).
        example: "npm run build"

      typecheck:
        type: string
        description: TypeScript type check command (used by auto-fix loops and verify).
        example: "npm run typecheck"

      lint:
        type: string
        description: Linter command (used by auto-fix loops and verify).
        example: "npm run lint"

      lint_fix:
        type: string
        description: Auto-fix linter command. Defaults to lint command with --fix appended.
        example: "npm run lint -- --fix"

      test:
        type: string
        description: Unit/integration test command.
        example: "npm run test"

      test_e2e:
        type: string
        description: End-to-end test command (used by visual-qa regression check).
        example: "npm run test:e2e"

      install:
        type: string
        description: Package install command (used after dependency changes).
        default: "npm install"
        example: "pnpm install"

  # ─── Run Options ──────────────────────────────────────────────────────────

  run_options:
    type: array
    description: >
      List of supported runtime flags for the project-harness orchestrator.
      Used to generate the usage section of orchestrator.md.
      Standard flags (--resume, --dry-run, --no-team, --skip-qa, --skip-verify,
      --verbose, --quiet) are always included and do not need to be listed here.
    items:
      type: object
      required:
        - flag
        - description
      additionalProperties: false
      properties:
        flag:
          type: string
          description: Flag string exactly as it appears in the usage line.
          example: "--monitor"
        description:
          type: string
          description: Short description shown in the usage block.
          example: "Start background monitoring for errors"
        condition:
          type: string
          description: Optional flag condition that makes this option available.
          example: "has_backend"
    example:
      - flag: "--monitor"
        description: "Start background error monitoring"
        condition: "has_backend"
      - flag: "--init"
        description: "Interactive project-config.yaml creation wizard"
