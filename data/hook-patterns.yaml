# Hook Patterns - catalog of Claude Code hook patterns for the scaffolding wizard
# Structure: protected_files, convention_rules, safety_rules
# Used by the wizard to suggest relevant hooks based on user's project type and tech stack

# ============================================================================
# Protected Files
# Patterns for files that should never be edited by AI agents.
# Each entry produces a PreToolUse hook that blocks Edit/Write on matching paths.
# ============================================================================

protected_files:

  - id: protect_env_files
    name: Protect .env files
    description: Prevent AI from reading or modifying environment variable files that may contain secrets, API keys, and credentials.
    pattern: "**/.env*"
    reason: Environment files contain secrets and deployment-specific configuration that must never be modified or exposed by AI.
    applicable_to:
      - all

  - id: protect_lock_files
    name: Protect dependency lock files
    description: Prevent AI from modifying package manager lock files. These are auto-generated and manual edits cause dependency resolution failures.
    pattern: "**/{package-lock.json,yarn.lock,pnpm-lock.yaml,Pipfile.lock,go.sum,Cargo.lock,composer.lock,Gemfile.lock,poetry.lock}"
    reason: Lock files are auto-generated by package managers. Manual edits break deterministic dependency resolution.
    applicable_to:
      - all

  - id: protect_prisma_migrations
    name: Protect applied Prisma migrations
    description: Prevent AI from modifying already-applied Prisma migration files. Altering applied migrations causes schema drift and deployment failures.
    pattern: "prisma/migrations/*/migration.sql"
    reason: Applied migrations are immutable history. Editing them causes schema drift between environments and breaks migration integrity.
    applicable_to:
      - prisma

  - id: protect_typeorm_migrations
    name: Protect applied TypeORM migrations
    description: Prevent AI from modifying already-applied TypeORM migration files. These represent executed database state transitions.
    pattern: "src/migrations/*.ts"
    reason: Applied TypeORM migrations represent executed schema changes. Modifying them causes inconsistencies between migration history and actual database state.
    applicable_to:
      - typeorm

  - id: protect_drizzle_migrations
    name: Protect applied Drizzle migrations
    description: Prevent AI from modifying already-applied Drizzle migration files. These are generated SQL snapshots tied to the migration journal.
    pattern: "drizzle/**/meta/_journal.json"
    reason: Drizzle migration journals track applied state. Altering them desynchronizes the migration system from the actual database.
    applicable_to:
      - drizzle

  - id: protect_supabase_migrations
    name: Protect Supabase migration files
    description: Prevent AI from modifying applied Supabase migration files. These are tracked by Supabase CLI and tied to remote database state.
    pattern: "supabase/migrations/*.sql"
    reason: Supabase migrations are tracked remotely by Supabase CLI. Editing applied migrations breaks the sync between local and remote schemas.
    applicable_to:
      - supabase

  - id: protect_ci_cd_config
    name: Protect CI/CD configuration
    description: Prevent AI from modifying CI/CD pipeline configurations without explicit instruction. Changes can break builds, deployments, and release processes.
    pattern: "**/{.github/workflows/*.yml,.github/workflows/*.yaml,.gitlab-ci.yml,Jenkinsfile,.circleci/config.yml,bitbucket-pipelines.yml}"
    reason: CI/CD configurations control build, test, and deployment pipelines. Unintended changes can break releases or introduce security vulnerabilities in the pipeline.
    applicable_to:
      - all

  - id: protect_docker_compose_prod
    name: Protect production Docker Compose
    description: Prevent AI from modifying production Docker Compose files. Changes can alter service topology, resource limits, and networking in production.
    pattern: "**/{docker-compose.prod.yml,docker-compose.production.yml,compose.prod.yml,compose.production.yml}"
    reason: Production compose files define live service topology, resource constraints, and networking. Unreviewed changes risk production outages.
    applicable_to:
      - docker

# ============================================================================
# Convention Rules
# Patterns for enforcing architectural and coding conventions.
# Each entry produces a hook that validates edits against project standards.
# ============================================================================

convention_rules:

  - id: fsd_layer_imports
    name: FSD layer import direction
    description: Enforce that Feature-Sliced Design layers only import from layers below them. Prevents upward imports that break the FSD dependency graph (e.g., features must not import from widgets or pages).
    event: PreToolUse
    matcher: Edit
    check_description: Verify that import statements in edited files do not reference upper FSD layers. Layer order from bottom to top is shared, entities, features, widgets, pages, app.
    applicable_to:
      - fsd

  - id: no_direct_db_access
    name: No direct DB access outside data layer
    description: Enforce that database queries and ORM calls only appear in the repository or data-access layer. Prevents domain and presentation layers from coupling directly to database implementation.
    event: PreToolUse
    matcher: Edit
    check_description: Verify that database client calls, raw SQL queries, and ORM operations only appear in files within the repository, data-access, or infrastructure layer directories.
    applicable_to:
      - clean_architecture
      - hexagonal

  - id: no_console_log
    name: No console.log in production code
    description: Prevent AI from adding console.log statements to production source code. Logging should use a structured logger. Console statements in source code leak information and clutter output.
    event: PostToolUse
    matcher: Edit
    check_description: Check that the edited file does not contain console.log, console.warn, console.error, or console.debug calls unless the file is in a test, script, or config directory.
    applicable_to:
      - typescript
      - javascript

  - id: no_any_type
    name: No any type in TypeScript
    description: Prevent AI from introducing the any type in TypeScript files. Using any disables type checking and undermines the value of the type system. Use unknown, generics, or proper type narrowing instead.
    event: PostToolUse
    matcher: Edit
    check_description: Check that the edited TypeScript file does not contain explicit any type annotations. Exceptions for type assertion escape hatches must include a justification comment.
    applicable_to:
      - typescript

  - id: react_hook_rules
    name: React hook rules - no hooks in conditions
    description: Enforce the Rules of Hooks by preventing AI from writing hook calls inside conditions, loops, or nested functions. Hooks must be called at the top level of a React component or custom hook.
    event: PostToolUse
    matcher: Edit
    check_description: Verify that React hook calls (useState, useEffect, useCallback, useMemo, useRef, useContext, and custom hooks starting with use) are not placed inside if blocks, for/while loops, ternary expressions, or nested function definitions.
    applicable_to:
      - react

  - id: api_route_auth_middleware
    name: API route must have auth middleware
    description: Enforce that every new API route definition includes authentication middleware. Prevents accidentally exposing unauthenticated endpoints in protected applications.
    event: PostToolUse
    matcher: Write
    check_description: Verify that newly created API route files include auth middleware registration (e.g., authenticate, requireAuth, withAuth, authGuard, or equivalent) unless the route is explicitly in a public routes allowlist.
    applicable_to:
      - has_auth
      - has_backend

  - id: no_inline_styles_react
    name: No inline styles in React components
    description: Prevent AI from adding inline style objects or style attributes to React JSX. Styles should use the project's chosen CSS methodology (CSS modules, Tailwind, styled-components, etc.) for consistency and maintainability.
    event: PostToolUse
    matcher: Edit
    check_description: Check that edited React component files do not contain style={{ or style={variableName} inline style patterns in JSX. Exceptions for dynamic styles that cannot be expressed in CSS (e.g., computed transforms) must include a justification comment.
    applicable_to:
      - react
      - has_ui

# ============================================================================
# Safety Rules
# Patterns for preventing security vulnerabilities and dangerous operations.
# Each entry uses regex matching to catch risky code patterns.
# ============================================================================

safety_rules:

  - id: dangerous_sql_commands
    name: Block dangerous SQL commands
    description: Prevent AI from writing destructive SQL commands that can cause irreversible data loss. DROP, TRUNCATE, and DELETE without a WHERE clause must be reviewed by a human before execution.
    event: PreToolUse
    matcher: Bash
    check_pattern: "(?i)(DROP\\s+(TABLE|DATABASE|INDEX|SCHEMA)|TRUNCATE\\s+TABLE|DELETE\\s+FROM\\s+\\w+\\s*;)"
    applicable_to:
      - has_database

  - id: hardcoded_secrets
    name: Block hardcoded secrets in source code
    description: Prevent AI from writing hardcoded API keys, passwords, tokens, or other credentials directly in source code. Secrets must be loaded from environment variables or a secrets manager.
    event: PostToolUse
    matcher: Write
    check_pattern: "(?i)(api[_-]?key|api[_-]?secret|password|passwd|secret[_-]?key|access[_-]?token|auth[_-]?token|private[_-]?key)\\s*[:=]\\s*[\"'][A-Za-z0-9+/=_\\-]{8,}[\"']"
    applicable_to:
      - all

  - id: no_eslint_disable
    name: Block ESLint rule disabling via comments
    description: Prevent AI from suppressing ESLint warnings by adding disable comments. Lint rules exist to enforce code quality and safety. If a rule triggers, the code should be fixed, not the rule silenced.
    event: PostToolUse
    matcher: Edit
    check_pattern: "(?i)(eslint-disable|eslint-disable-next-line|eslint-disable-line|@ts-ignore|@ts-nocheck|@ts-expect-error)"
    applicable_to:
      - typescript
      - javascript

  - id: no_direct_dom_react
    name: Block direct DOM manipulation in React
    description: Prevent AI from using imperative DOM APIs in React components. Direct DOM manipulation bypasses React's virtual DOM reconciliation, causing state inconsistencies and rendering bugs.
    event: PostToolUse
    matcher: Edit
    check_pattern: "(document\\.getElementById|document\\.querySelector|document\\.createElement|document\\.getElementsBy|innerHTML\\s*=|outerHTML\\s*=|\\.appendChild\\(|\\.removeChild\\(|\\.insertBefore\\()"
    applicable_to:
      - react

  - id: no_eval_exec
    name: Block unsafe eval and exec usage
    description: Prevent AI from using eval(), Function(), or exec() to dynamically execute code strings. These functions are a major attack vector for code injection and should never appear in application code.
    event: PreToolUse
    matcher: Edit
    check_pattern: "(?i)(\\beval\\s*\\(|\\bnew\\s+Function\\s*\\(|\\bexec\\s*\\(|\\bexecSync\\s*\\(|\\bchild_process\\.exec)"
    applicable_to:
      - all
