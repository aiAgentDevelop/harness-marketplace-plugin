# Agents - domain-specific verification agents for the scaffolding wizard
# Used by AI to filter/rank agent options based on project type, tech stack, and concerns
# Each agent becomes a parallel worker in plan, implement, and verify phases

agents:

  security:

    - id: security-reviewer
      name: Security Reviewer
      domain: security
      description: Reviews code for security vulnerabilities including injection, XSS, CSRF, CORS misconfiguration, auth bypass, and secrets exposure. Validates input sanitization and output encoding.
      suitable_project_types:
        - web
        - mobile
        - backend
        - desktop
        - game
        - cli
        - data
        - iot
      key_concerns:
        - injection
        - xss
        - csrf
        - cors
        - auth_bypass
        - secrets_exposure
        - input_sanitization
      recommended_when:
        - has_auth
        - has_backend
      model: opus

    - id: auth-auditor
      name: Auth Auditor
      domain: security
      description: Validates authentication and authorization flows including token handling, session security, MFA implementation, RBAC/ABAC enforcement, OAuth/OIDC compliance, and JWT best practices.
      suitable_project_types:
        - web
        - mobile
        - backend
        - desktop
      key_concerns:
        - token_handling
        - session_security
        - mfa_flows
        - rbac_abac
        - oauth_oidc
        - jwt_best_practices
      recommended_when:
        - has_auth
      model: opus

    - id: dependency-vulnerability-scanner
      name: Dependency Vulnerability Scanner
      domain: security
      description: Scans dependencies for known CVEs, checks lock file integrity, flags outdated packages with security patches, and validates supply chain safety.
      suitable_project_types:
        - web
        - mobile
        - backend
        - desktop
        - game
        - cli
        - data
        - iot
      key_concerns:
        - known_cves
        - lock_file_integrity
        - outdated_packages
        - supply_chain
      recommended_when: []
      model: sonnet

    - id: supabase-security-gate
      name: Supabase Security Gate
      domain: security
      description: Deep Supabase-specific security validator running a 17-point checklist across 5 sections — Table Security (RLS enablement + per-op policies + auth.uid enforcement + admin isolation + JOIN bypass), Client Security (anon-only key, env-var injection, RPC/Edge wrappers over direct .from()), Auth Security (getUser over getSession, server-side auth guard, redirect/401 handling), Storage Security (bucket RLS, MIME/size limits, public/private separation), API Security (parameterized queries, SECURITY DEFINER input validation, Edge origin checks). Binary PASS/BLOCK verdict. Runs after implement phase on Supabase-touching files + after any migration SQL change.
      suitable_project_types:
        - web
        - mobile
        - backend
      key_concerns:
        - rls_enforcement_all_tables
        - rls_policies_per_op
        - auth_uid_ownership_check
        - admin_table_service_role_only
        - rls_bypass_via_join_or_subquery
        - anon_only_client_key
        - env_var_key_injection
        - rpc_edge_wrapper_over_direct_from
        - get_user_over_get_session
        - server_auth_before_query
        - storage_bucket_rls
        - storage_mime_size_limits
        - storage_public_private_separation
        - parameterized_queries
        - security_definer_input_validation
        - edge_origin_auth_check
      recommended_when:
        - has_database
      model: opus

  performance:

    - id: performance-auditor
      name: Performance Auditor
      domain: performance
      description: Analyzes code for performance issues including N+1 queries, memory leaks, unnecessary re-renders, algorithmic complexity, and resource-intensive operations.
      suitable_project_types:
        - web
        - mobile
        - backend
        - desktop
        - game
        - cli
        - data
        - iot
      key_concerns:
        - n_plus_1_queries
        - memory_leaks
        - algorithmic_complexity
        - resource_intensive_operations
        - unnecessary_computation
      recommended_when:
        - has_backend
        - has_database
