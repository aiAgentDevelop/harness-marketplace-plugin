        - backend
        - desktop
        - game
        - cli
        - data
        - iot
      key_concerns:
        - pattern_search
        - codebase_wide_analysis
        - similar_code_detection
        - impact_scope_assessment
        - preventive_fix_identification
      recommended_when: []
      model: sonnet

