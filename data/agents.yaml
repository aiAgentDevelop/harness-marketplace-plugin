    - id: bundle-size-analyzer
      name: Bundle Size Analyzer
      domain: performance
      description: Monitors JavaScript/CSS bundle sizes, detects tree-shaking failures, flags heavy imports, validates code splitting boundaries, and checks lazy loading implementation.
      suitable_project_types:
        - web
        - mobile
        - desktop
      key_concerns:
        - bundle_size_regression
        - tree_shaking_failures
        - heavy_imports
        - code_splitting
        - lazy_loading
      recommended_when:
        - has_ui
      model: sonnet

    - id: render-performance-auditor
      name: Render Performance Auditor
      domain: performance
      description: Validates UI rendering performance including unnecessary re-renders, expensive computations in render path, virtualization for large lists, animation frame budget, and layout thrashing.
      suitable_project_types:
        - web
        - mobile
        - desktop
      key_concerns:
        - unnecessary_rerenders
        - expensive_render_computations
        - virtualization
        - animation_frame_budget
        - layout_thrashing
      recommended_when:
        - has_ui
      model: sonnet

    - id: memory-profiler
      name: Memory Profiler
      domain: performance
      description: Detects memory leaks, monitors heap usage patterns, validates garbage collection friendliness, checks for unbounded caches, and reviews object lifecycle management.
      suitable_project_types:
        - backend
        - game
        - desktop
        - data
      key_concerns:
        - memory_leaks
        - heap_usage
        - garbage_collection
        - unbounded_caches
        - object_lifecycle
      recommended_when: []
      model: sonnet

  database:

